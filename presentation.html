<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Onboarding presentation guide for Way-Of team setup: GitHub, AI Harness, Zed IDE.">
    <meta name="keywords" content="onboarding, presentation, guide, WayOfMono, WayOfTeams, AI Harness">
    <meta name="author" content="WayOfMono Engineering">
    <meta property="og:title" content="Way-Of Onboarding Presentation">
    <meta property="og:description" content="Step-by-step onboarding guide.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://onboard.wayofmono.com/presentation.html">
    <meta property="og:image" content="/og-image.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Way-Of Onboarding Presentation">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
    <title>Onboarding Presentation — Way-Of</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#115e59', DEFAULT: '#14b8a6' }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #09090b 0%, #18181b 100%);
            min-height: 100vh;
        }
        .slide-container {
            max-width: 56rem;
            margin: 0 auto;
        }
        .slide-title {
            font-size: 2.5rem;
            line-height: 1.2;
        }
        .slide-body {
            font-size: 1.125rem;
            line-height: 1.8;
        }
        .slide-body code {
            font-size: 0.9rem;
        }
        .slide-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .glow-accent { box-shadow: 0 0 20px rgba(20,184,166,0.15); }
        @media (max-width: 640px) {
            .slide-title { font-size: 1.5rem; }
            .slide-body { font-size: 0.95rem; }
        }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex flex-col antialiased">
    <!-- Simple top bar -->
    <header class="border-b border-zinc-800/60 bg-zinc-900/50 backdrop-blur-sm px-4 py-2.5">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="p-1.5 bg-brand/10 border border-brand/20 rounded-lg text-brand">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="text-sm font-bold text-white">Onboarding</span>
                <span class="text-[10px] text-zinc-500 hidden sm:inline">Step-by-step guide</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="text-xs text-zinc-500 font-mono">
                    <span id="current-num" class="text-zinc-200 font-bold">1</span>/<span id="total-num" class="font-bold">13</span>
                </div>
                <a href="index.html" class="px-3 py-1.5 rounded-lg bg-zinc-800/60 hover:bg-zinc-800 border border-zinc-700/50 text-zinc-300 hover:text-white transition-all flex items-center gap-1.5 text-xs">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                    Dashboard
                </a>
            </div>
        </div>
    </header>

    <!-- Slide area -->
    <main class="flex-1 flex items-center justify-center p-4 sm:p-8">
        <div class="slide-container w-full">
            <div class="bg-zinc-900/50 border border-zinc-800/80 rounded-3xl p-6 sm:p-10 relative shadow-2xl glow-accent">
                <div class="absolute -top-12 -right-12 w-48 h-48 bg-brand/5 rounded-full blur-3xl pointer-events-none"></div>
                <div class="absolute -bottom-12 -left-12 w-48 h-48 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>

                <!-- Step badge -->
                <div class="flex items-center gap-3 mb-6">
                    <span id="step-badge" class="text-xs font-bold tracking-widest text-brand uppercase bg-brand/10 border border-brand/20 px-3 py-1 rounded-full">
                        Getting Started
                    </span>
                    <button id="complete-toggle" onclick="toggleComplete()" class="text-xs flex items-center gap-1.5 px-3 py-1 rounded-full border transition-all" title="Mark step complete">
                        <span id="check-icon" class="w-3.5 h-3.5 rounded border border-zinc-600 flex items-center justify-center text-[10px]"> </span>
                        <span id="check-label" class="text-zinc-500">Mark Complete</span>
                    </button>
                </div>

                <!-- Title -->
                <h1 id="slide-title" class="slide-title font-extrabold text-white tracking-tight mb-6">
                    Welcome Title Here
                </h1>

                <!-- Body -->
                <div id="slide-body" class="slide-body text-zinc-300 space-y-4 leading-relaxed slide-transition max-h-[50vh] overflow-y-auto custom-scrollbar pr-2">
                </div>

                <!-- Navigation -->
                <div class="mt-10 pt-6 border-t border-zinc-800/60 flex items-center justify-between gap-4">
                    <button id="prev-btn" onclick="prevSlide()" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-zinc-800/60 hover:bg-zinc-800 text-zinc-300 border border-zinc-700/50 hover:text-white transition-all flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                        </svg>
                        Back
                    </button>
                    <div class="flex items-center gap-2">
                        <div class="flex gap-1.5">
                            <span id="slide-dots" class="flex gap-1"></span>
                        </div>
                    </div>
                    <button id="next-btn" onclick="nextSlide()" class="px-6 py-2.5 rounded-xl text-sm font-semibold bg-brand text-zinc-950 hover:bg-brand/90 font-bold transition-all flex items-center gap-1.5 shadow-lg shadow-brand/10">
                        Next
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-800/40 py-3 text-center text-[10px] text-zinc-600">
        Use arrow keys ← → to navigate · Way-Of Onboarding
    </footer>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-10 opacity-0 pointer-events-none transition-all duration-300 bg-zinc-900 border border-brand-500/30 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 max-w-sm">
        <div class="p-1 rounded-full bg-brand-500/20 text-brand-400">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <span id="toast-message" class="text-sm font-medium">Copied!</span>
    </div>

    <script type="module">
        import { slides, SLIDE_COUNT } from './src/data/slides.js';

        const state = {
            currentSlide: 0,
            completedSlides: loadProgress()
        };

        // --- Storage ---
        function loadProgress() {
            try {
                const data = JSON.parse(localStorage.getItem('wayofmono_onboarding_progress') || '{}');
                return data.completedSlides || [];
            } catch { return []; }
        }

        function saveProgress() {
            try {
                const existing = JSON.parse(localStorage.getItem('wayofmono_onboarding_progress') || '{}');
                existing.completedSlides = state.completedSlides;
                localStorage.setItem('wayofmono_onboarding_progress', JSON.stringify(existing));
            } catch {}
        }

        // --- Toast ---
        function showToast(msg) {
            const el = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            if (!el) return;
            msgEl.textContent = msg;
            el.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
            el.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => {
                el.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
                el.classList.remove('translate-y-0', 'opacity-100');
            }, 2500);
        }

        // --- Render ---
        function renderSlide() {
            const slide = slides[state.currentSlide];
            if (!slide) return;

            document.getElementById('slide-title').textContent = slide.title;
            document.getElementById('slide-body').innerHTML = slide.body;
            document.getElementById('step-badge').textContent = slide.step;
            document.getElementById('current-num').textContent = state.currentSlide + 1;
            document.getElementById('total-num').textContent = SLIDE_COUNT;

            const dots = document.getElementById('slide-dots');
            dots.innerHTML = '';
            for (let i = 0; i < SLIDE_COUNT; i++) {
                const dot = document.createElement('span');
                dot.className = i === state.currentSlide
                    ? 'w-2 h-2 rounded-full bg-brand'
                    : state.completedSlides.includes(i)
                        ? 'w-2 h-2 rounded-full bg-brand/30'
                        : 'w-2 h-2 rounded-full bg-zinc-700';
                dots.appendChild(dot);
            }

            const isComplete = state.completedSlides.includes(state.currentSlide);
            const checkIcon = document.getElementById('check-icon');
            const checkLabel = document.getElementById('check-label');
            const toggleBtn = document.getElementById('complete-toggle');
            if (isComplete) {
                checkIcon.innerHTML = '<svg class="w-2.5 h-2.5 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>';
                checkLabel.textContent = 'Completed';
                toggleBtn.className = 'text-xs flex items-center gap-1.5 px-3 py-1 rounded-full border border-brand/30 bg-brand/5 text-brand';
            } else {
                checkIcon.innerHTML = '';
                checkLabel.textContent = 'Mark Complete';
                toggleBtn.className = 'text-xs flex items-center gap-1.5 px-3 py-1 rounded-full border border-zinc-700/50 text-zinc-500 hover:border-zinc-600 hover:text-zinc-300 transition-all';
            }

            document.getElementById('prev-btn').style.visibility = state.currentSlide === 0 ? 'hidden' : 'visible';
            document.getElementById('next-btn').textContent = state.currentSlide === SLIDE_COUNT - 1 ? 'Done' : 'Next';
        }

        function nextSlide() {
            if (state.currentSlide < SLIDE_COUNT - 1) {
                state.currentSlide++;
                renderSlide();
            } else {
                showToast('All steps complete!');
            }
        }

        function prevSlide() {
            if (state.currentSlide > 0) {
                state.currentSlide--;
                renderSlide();
            }
        }

        function toggleComplete() {
            const idx = state.currentSlide;
            const i = state.completedSlides.indexOf(idx);
            if (i > -1) {
                state.completedSlides.splice(i, 1);
            } else {
                state.completedSlides.push(idx);
            }
            saveProgress();
            renderSlide();
        }

        // --- Keyboard ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        window.nextSlide = nextSlide;
        window.prevSlide = prevSlide;
        window.toggleComplete = toggleComplete;
        window.showToast = showToast;

        renderSlide();
    </script>
</body>
</html>
